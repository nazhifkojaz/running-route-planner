# Alembic configuration file
[alembic]
script_location = alembic
prepend_sys_path = .
truncate_slug_length = 40

# Programmatic configuration in app/db.py overrides this value at runtime.
sqlalchemy.url = postgresql+psycopg://user:password@localhost/running_route_planner

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
